global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: local
    env:     dev

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── Spring Boot services (static for local compose) ────
  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - config-server:8888
          - eureka:8761
          - api-gateway:8080
          - order-service:8081
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+).*'
        target_label: service
        replacement: '$1'

  # ── Kubernetes pod auto-discovery (production) ──────────
  # Uncomment in a real cluster to replace static_configs above
