groups:
  - name: spring-services
    interval: 30s
    rules:

      # ── Availability ──────────────────────────────────

      - alert: ServiceDown
        expr: up{job="spring-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Prometheus cannot scrape {{ $labels.service }} for > 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (service) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5m."

      # ── Latency ───────────────────────────────────────

      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_server_requests_seconds_bucket[5m])) by (service, le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 2s on {{ $labels.service }}"
          description: "P99 = {{ $value | humanizeDuration }}"

      # ── JVM ───────────────────────────────────────────

      - alert: JvmHeapHigh
        expr: |
          sum(jvm_memory_used_bytes{area="heap"}) by (service)
          /
          sum(jvm_memory_max_bytes{area="heap"}) by (service) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap > 85% on {{ $labels.service }}"

      - alert: JvmGcPauseHigh
        expr: |
          rate(jvm_gc_pause_seconds_sum[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GC pause time high on {{ $labels.service }}"

      # ── Circuit Breaker ───────────────────────────────

      - alert: CircuitBreakerOpen
        expr: |
          resilience4j_circuitbreaker_state{state="open"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Circuit breaker OPEN: {{ $labels.name }} on {{ $labels.service }}"
