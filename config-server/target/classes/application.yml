server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/org/service-configs}
          default-label: main
          search-paths: '{application}'
          clone-on-start: true
          timeout: 10
        native:
          search-locations: file:${CONFIG_REPO_PATH:../config-repo}
  security:
    user:
      name: ${CONFIG_USER:config-admin}
      password: ${CONFIG_PASSWORD:changeme}

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
  endpoint:
    health:
      show-details: always
